<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUBE PARKOUR: 1000M ELITE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui" style="display: none;">
        <div id="tokenBoard">🪙 0</div>
        <div id="scoreBoard">0m</div>
        <div id="highScoreBoard">🏆 0m</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <div class="controls" id="mobileControls" style="display: none;">
        <div class="dir-pad">
            <button class="control-btn" id="leftBtn">L</button>
            <button class="control-btn" id="rightBtn">R</button>
        </div>
        <button class="control-btn jump-btn" id="jumpBtn">JUMP</button>
    </div>

    <div id="mainMenu" class="menu-screen">
        <div class="menu-content-wrapper">
            <h1 class="game-title elite-glow">CUBE<br><span class="highlight">PARKOUR PRO</span></h1>
            <div class="menu-buttons">
                <button id="startBtn" class="menu-btn primary">LAUNCH SESSION</button>
                <button id="shopBtn" class="menu-btn shop-gold">ELITE STORE</button>
                <button id="leaderboardBtn" class="menu-btn">GLOBAL RANKS</button>
                <button id="skinMenuBtn" class="menu-btn">SKIN CABINET</button>
                <button id="settingsBtn" class="menu-btn">CALIBRATION</button>
            </div>
        </div>
    </div>

    <div id="shopMenu" class="menu-screen" style="display: none;">
        <h2 class="menu-title">ELITE STORE</h2>
        <div class="shop-grid-container">
            <div class="shop-card">
                <h3>ENVIRONMENTS</h3>
                <div id="envList" class="shop-item-list"></div>
                <div class="pagination-row" style="margin-top:10px;">
                    <button id="prevEnvPage" class="p-btn">PREV</button>
                    <span id="envPageNum">1/2</span>
                    <button id="nextEnvPage" class="p-btn">NEXT</button>
                </div>
            </div>
            <div class="shop-card">
                <h3>TECH UPGRADES</h3>
                <div id="techList" class="shop-item-list"></div>
            </div>
        </div>
        <button class="menu-btn secondary close-btn">RETURN</button>
    </div>

    <div id="skinMenu" class="menu-screen" style="none;">
        <h2 class="menu-title">SKIN CABINET</h2>
        <div class="skin-glass-panel">
            <div class="skin-grid" id="skinGrid"></div>
        </div>
        <div class="pagination-row">
            <button id="prevSkinPage" class="p-btn">PREV</button>
            <span id="skinPageNum">PAGE 1</span>
            <button id="nextSkinPage" class="p-btn">NEXT</button>
        </div>
        <button class="menu-btn secondary close-btn">RETURN</button>
    </div>

    <div id="settingsModal" class="menu-screen" style="display: none;">
        <h2 class="menu-title">CALIBRATION</h2>
        <div class="calibration-box">
            <div class="setting-row"><span>JUMP ACTION</span><button id="bindJump" class="bind-btn">SPACE</button></div>
            <div class="setting-row"><span>MOVE LEFT</span><button id="bindLeft" class="bind-btn">LEFT</button></div>
            <div class="setting-row"><span>MOVE RIGHT</span><button id="bindRight" class="bind-btn">RIGHT</button></div>
        </div>
        <button class="menu-btn secondary close-btn">SAVE CHANGES</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
