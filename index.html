<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cube Parkour: 1000m Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui">
        <div id="scoreBoard">Height: 0m</div>
        <div id="highScoreBoard">Best: 0m</div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div id="overlay">
        <h2 id="statusText">CUBE PARKOUR</h2>
        <button id="startBtn">START GAME</button>
    </div>

    <div id="skinMenu">
        <h3>Skins</h3>
        <div class="skin-grid">
            <button class="skin-btn" id="skin-orange" onclick="changeSkin('#ff5722', 0)">0m</button>
            <button class="skin-btn" id="skin-blue" onclick="changeSkin('#2196f3', 50)">50m</button>
            <button class="skin-btn" id="skin-green" onclick="changeSkin('#4caf50', 100)">100m</button>
            <button class="skin-btn" id="skin-purple" onclick="changeSkin('#9c27b0', 150)">150m</button>
            <button class="skin-btn" id="skin-gold" onclick="changeSkin('#ffcc00', 200)">200m</button>
            <button class="skin-btn" id="skin-mint" onclick="changeSkin('#1de9b6', 250)">250m</button>
            <button class="skin-btn" id="skin-striped" onclick="changeSkin('striped', 300)">300m</button>
            <button class="skin-btn" id="skin-camo" onclick="changeSkin('camo', 350)">350m</button>
            <button class="skin-btn" id="skin-ghost" onclick="changeSkin('ghost', 400)">400m</button>
            <button class="skin-btn" id="skin-lava" onclick="changeSkin('lava', 450)">450m</button>
            <button class="skin-btn" id="skin-rainbow" onclick="changeSkin('rainbow', 500)">500m</button>
            <button class="skin-btn" id="skin-neon" onclick="changeSkin('neon', 600)">600m</button>
            <button class="skin-btn" id="skin-diamond" onclick="changeSkin('diamond', 700)">700m</button>
            <button class="skin-btn" id="skin-ruby" onclick="changeSkin('ruby', 800)">800m</button>
            <button class="skin-btn" id="skin-emerald" onclick="changeSkin('emerald', 900)">900m</button>
            <button class="skin-btn" id="skin-void" onclick="changeSkin('void', 1000)">1000m</button>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" id="leftBtn">◀</button>
        <button class="control-btn" id="jumpBtn">JUMP</button>
        <button class="control-btn" id="rightBtn">▶</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
