<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cube Parkour: 1000m Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui">
        <div id="tokenBoard">Tokens: 0</div>
        <div id="scoreBoard">Height: 0m</div>
        <div id="highScoreBoard">Best: 0m</div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="controls">
        <button class="control-btn" id="leftBtn">◀</button>
        <button class="control-btn" id="jumpBtn">JUMP</button>
        <button class="control-btn" id="rightBtn">▶</button>
    </div>

    <div id="mainMenu" class="menu-screen">
        <h1 class="game-title">CUBE PARKOUR</h1>
        <div class="menu-buttons">
            <button id="startBtn" class="menu-btn primary">START GAME</button>
            <button id="shopBtn" class="menu-btn shop-gold">SHOP</button>
            <button id="skinMenuBtn" class="menu-btn">SKINS</button>
            <button id="settingsBtn" class="menu-btn">SETTINGS</button>
        </div>
    </div>

    <div id="shopMenu" class="menu-screen" style="display: none;">
        <h2 class="shop-title">THE CUBE STORE</h2>
        <div class="shop-grid-container">
            <div class="shop-card">
                <h3>Backgrounds</h3>
                <div class="shop-item-list">
                    <button class="shop-item" onclick="buyItem('bg', 'White', 0)">
                        <span>Classic White</span><span class="price">FREE</span>
                    </button>
                    <button class="shop-item" onclick="buyItem('bg', 'Blue', 0)">
                        <span>Sky Blue</span><span class="price">FREE</span>
                    </button>
                    <button class="shop-item" onclick="buyItem('bg', 'Sunset', 30)">
                        <span>Sunset</span><span class="price">30 T</span>
                    </button>
                    <button class="shop-item" onclick="buyItem('bg', 'Space', 50)">
                        <span>Space</span><span class="price">50 T</span>
                    </button>
                </div>
            </div>
            <div class="shop-card">
                <h3>Powerups</h3>
                <div class="shop-item-list">
                    <button class="shop-item" onclick="buyItem('pow', 'DoubleJump', 100)">
                        <span>Extra Jump</span><span class="price">100 T</span>
                    </button>
                    <button class="shop-item" onclick="buyItem('pow', 'Shield', 75)">
                        <span>Shield</span><span class="price">75 T</span>
                    </button>
                </div>
            </div>
        </div>
        <button id="closeShop" class="menu-btn secondary">BACK TO MENU</button>
    </div>

    <div id="settingsModal" class="menu-screen" style="display: none;">
        <h2>SETTINGS</h2>
        <div class="setting-item"><span>Jump:</span><button id="bindJump" class="bind-btn">Space</button></div>
        <div class="setting-item"><span>Left:</span><button id="bindLeft" class="bind-btn">Left</button></div>
        <div class="setting-item"><span>Right:</span><button id="bindRight" class="bind-btn">Right</button></div>
        <button id="backToMenu" class="menu-btn secondary">BACK</button>
    </div>

    <div id="skinMenu" style="display: none;">
        <h3>Skins</h3>
        <div class="skin-grid">
            <button class="skin-btn" id="skin-orange" onclick="changeSkin('#ff5722', 0)">0m</button>
            <button class="skin-btn" id="skin-blue" onclick="changeSkin('#2196f3', 50)">50m</button>
            <button class="skin-btn" id="skin-green" onclick="changeSkin('#4caf50', 100)">100m</button>
            <button class="skin-btn" id="skin-purple" onclick="changeSkin('#9c27b0', 150)">150m</button>
            <button class="skin-btn" id="skin-gold" onclick="changeSkin('#ffcc00', 200)">200m</button>
            <button class="skin-btn" id="skin-rainbow" onclick="changeSkin('rainbow', 500)">500m</button>
            <button class="skin-btn" id="skin-void" onclick="changeSkin('void', 1000)">1000m</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
