<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUBE PARKOUR: 1000M ELITE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui">
        <div id="tokenBoard">🪙 0</div>
        <div id="scoreBoard">0m</div>
        <div id="highScoreBoard">🏆 0m</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <div class="controls" id="mobileControls">
        <div class="dir-pad">
            <button class="control-btn" id="leftBtn">L</button>
            <button class="control-btn" id="rightBtn">R</button>
        </div>
        <button class="control-btn jump-btn" id="jumpBtn">JUMP</button>
    </div>

    <div id="mainMenu" class="menu-screen">
        <div class="menu-content">
            <h1 class="game-title">CUBE<br><span class="highlight">PARKOUR PRO</span></h1>
            <div class="menu-buttons">
                <button id="startBtn" class="menu-btn primary">LAUNCH SESSION</button>
                <button id="shopBtn" class="menu-btn shop-gold">ELITE STORE</button>
                <button id="skinMenuBtn" class="menu-btn">SKIN CABINET</button>
                <button id="settingsBtn" class="menu-btn">CALIBRATION</button>
            </div>
        </div>
    </div>

    <div id="shopMenu" class="menu-screen" style="display: none;">
        <h2 class="menu-title">ELITE STORE</h2>
        <div class="shop-grid-container">
            <div class="shop-card">
                <h3>ENVIRONMENTS</h3>
                <div class="shop-item-list scrollable">
                    <button class="shop-item" onclick="buyItem('bg', 'White', 0)">White (1x) <span class="price">OWNED</span></button>
                    <button class="shop-item" onclick="buyItem('bg', 'Blue', 50)">Blue (1.2x) <span class="price">50</span></button>
                    <button class="shop-item" onclick="buyItem('bg', 'Forest', 100)">Forest (1.5x) <span class="price">100</span></button>
                    <button class="shop-item" onclick="buyItem('bg', 'Midnight', 250)">Midnight (3x) <span class="price">250</span></button>
                    <button class="shop-item" onclick="buyItem('bg', 'Void', 500)">Void (10x) <span class="price">500</span></button>
                </div>
            </div>
            <div class="shop-card">
                <h3>TECH UPGRADES</h3>
                <div class="shop-item-list">
                    <button class="shop-item" onclick="buyItem('pow', 'DoubleJump', 150)">Double Jump <span class="price">150</span></button>
                    <button class="shop-item" onclick="buyItem('pow', 'Magnet', 200)">Token Magnet <span class="price">200</span></button>
                </div>
            </div>
        </div>
        <button class="menu-btn secondary close-btn">RETURN</button>
    </div>

    <div id="skinMenu" class="menu-screen" style="display: none;">
        <h2 class="menu-title">SKIN CABINET</h2>
        <div class="skin-container">
            <div class="skin-grid" id="skinGrid"></div>
        </div>
        <div class="pagination-controls">
            <button id="prevSkinPage" class="nav-btn">PREV</button>
            <span id="skinPageNum">PAGE 1</span>
            <button id="nextSkinPage" class="nav-btn">NEXT</button>
        </div>
        <button class="menu-btn secondary close-btn">RETURN</button>
    </div>

    <div id="settingsModal" class="menu-screen" style="display: none;">
        <h2 class="menu-title">CALIBRATION</h2>
        <div class="calibration-box">
            <div class="setting-row">
                <label>JUMP ACTION</label>
                <button id="bindJump" class="bind-btn">SPACE</button>
            </div>
            <div class="setting-row">
                <label>MOVE LEFT</label>
                <button id="bindLeft" class="bind-btn">LEFT</button>
            </div>
            <div class="setting-row">
                <label>MOVE RIGHT</label>
                <button id="bindRight" class="bind-btn">RIGHT</button>
            </div>
        </div>
        <button class="menu-btn secondary close-btn">SAVE & RETURN</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
