<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cube Parkour Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ui">
        <div id="tokenBoard">🪙 0</div>
        <div id="scoreBoard">Height: 0m</div>
        <div id="highScoreBoard">🏆 0m</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <div class="controls" id="mobileControls">
        <div class="dir-pad">
            <button class="control-btn" id="leftBtn">←</button>
            <button class="control-btn" id="rightBtn">→</button>
        </div>
        <button class="control-btn jump-btn" id="jumpBtn">UP</button>
    </div>

    <div id="mainMenu" class="menu-screen">
        <h1 class="game-title">CUBE<br><span class="highlight">PARKOUR</span></h1>
        <div class="menu-buttons">
            <button id="startBtn" class="menu-btn primary">PLAY</button>
            <button id="shopBtn" class="menu-btn shop-gold">SHOP</button>
            <button id="skinMenuBtn" class="menu-btn">SKINS</button>
            <button id="settingsBtn" class="menu-btn">SETTINGS</button>
        </div>
    </div>

    <div id="shopMenu" class="menu-screen" style="display: none;">
        <h2 class="menu-title">SHOP</h2>
        <div class="shop-grid-container">
            <div class="shop-card">
                <h3>Backgrounds</h3>
                <div class="shop-item-list scrollable">
                    <button class="shop-item" onclick="buyItem('bg', 'White', 0)">White <span class="price">0</span></button>
                    <button class="shop-item" onclick="buyItem('bg', 'Blue', 0)">Blue <span class="price">0</span></button>
                    <button class="shop-item" onclick="buyItem('bg', 'Void', 300)">Void <span class="price">300</span></button>
                </div>
            </div>
            <div class="shop-card">
                <h3>Upgrades</h3>
                <div class="shop-item-list">
                    <button class="shop-item" onclick="buyItem('pow', 'DoubleJump', 100)">Double Jump</button>
                </div>
            </div>
        </div>
        <button class="menu-btn secondary close-btn">BACK</button>
    </div>

    <div id="skinMenu" class="menu-screen" style="display: none;">
        <h2 class="menu-title">SKINS</h2>
        <div class="skin-grid" id="skinGrid"></div>
        <button class="menu-btn secondary close-btn">BACK</button>
    </div>

    <div id="settingsModal" class="menu-screen" style="display: none;">
        <h2 class="menu-title">KEYBINDS</h2>
        <div class="settings-list">
            <div class="setting-item"><span>JUMP</span><button id="bindJump" class="bind-btn">SPACE</button></div>
            <div class="setting-item"><span>LEFT</span><button id="bindLeft" class="bind-btn">LEFT</button></div>
            <div class="setting-item"><span>RIGHT</span><button id="bindRight" class="bind-btn">RIGHT</button></div>
        </div>
        <button class="menu-btn secondary close-btn">BACK</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
